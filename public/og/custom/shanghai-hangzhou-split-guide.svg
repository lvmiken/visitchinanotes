  <text x="104" y="232" font-size="56" font-weight="700" fill="#13253A" font-family="Georgia, 'Times New Roman', serif">Shanghai and Hangzhou:</text>
  <text x="104" y="296" font-size="56" font-weight="700" fill="#13253A" font-family="Georgia, 'Times New Roman', serif">Day Trip or Overnight Split?</text>
  <text x="104" y="418" font-size="28" fill="#203244" font-family="Georgia, 'Times New Roman', serif">Choose the faster option only if Shanghai stays the true anchor. Stay overnight</text>
